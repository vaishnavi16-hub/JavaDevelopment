<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration form</title>
</head>
<body>
    
    <h2>Job registration form</h2>

    <form action="login.html" method="GET">

<label >First Name</label>
<input type="text" name="first name" placeholder="Enter your first name"><br><br>

<label >First Name</label>
<input type="text" name="Last name" placeholder="Enter your lastname"><br><br>



<label >Email</label>
<input type="email" name="email" ><br><br>

<label >Password</label>
<input type="password" name="password"><br><br>

<label >Mobile Number</label>
<input type="tel" name="mobile" ><br><br>

<label >Gender</label><br>
<input type="radio" name="gender" >Male<br>
<input type="radio" name="gender" >FeMale<br><br>

<label >Date of Birth</label>
<input type="date" name="city"><br><br>

<label >Qualification</label>
<select name="qualification" id="">
    <option >BE</option>
    <option >BSc</option>
    <option >Btech</option>
    <option >MCA</option>
</select>


<label >Experiance</label>
<input type="text" name="Experiance" ><br><br>

<label >Skills</label>
<input type="text" name="skills" ><br><br>

<label >Preferred job role</label>
<input type="text" name="jobrole" ><br><br>


<label >Expected Salary</label>
<input type="text" name="salary" ><br><br>

<label >Resume Uploaded</label>
<input type="file" name="resume" ><br><br>


<label >Languages Known</label><br>
<input type="checkbox" name="language" >English<br>
<input type="checkbox" name="language" >Hindi<br>
<input type="checkbox" name="language" >Marathi<br><br>


<label >Linkdin Profile</label><br>
<input type="url" name="linkdin" ><br><br>


<label >Available joining date</label><br>
<input type="date" name="joining date" >English<br><br>


<button>Submit</button>

    </form>
</body>
</html>
