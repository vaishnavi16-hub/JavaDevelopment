<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration form</title>
</head>
<body>
    
<form action="login.html" method="get">
    <h1>Student registration form...</h1>

    <label > Full Name :- </label>
    <input type="text" name="full name" placeholder="enter your full name" required><br><br>

    <label > Email Id :- </label>
    <input type="email" name="full name" placeholder="enter your email" required><br><br>

    <label > Password :- </label>
    <input type="password" name="full name" placeholder="enter your password" required><br><br>

    <label > Address :- </label>
    <input type="text" name="full name" placeholder="enter your Address" required><br><br>

    <label>Gender :</label><br>

    <input type="radio" id="male" name="gender" value="Male">
     <label for="male">Male</label>

     <input type="radio" id="female" name="gender" value="Female">
     <label for="female">Female</label> <br><br>
     

   <button>Submit</button>

   </form>
</body>
</html>
